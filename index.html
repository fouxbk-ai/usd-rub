<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>DollarFlip</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%230E0E10'/%3E%3Ctext x='32' y='45' text-anchor='middle' font-family='Arial,Helvetica,sans-serif' font-size='44' font-weight='700' fill='%23D4AF78'%3E%24%3C/text%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500;9..144,600&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0E0E10;
    --bg-2: #16161A;
    --cream: #EFE9DC;
    --cream-dim: #D8D8D8;
    --cream-faint: #9A9A9A;
    --gold: #D4AF78;
    --gold-dim: #8B7548;
    --line: #26252A;
    --green: #8FB07B;
    --red: #C97A6E;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--cream);
    font-family: 'Fraunces', Georgia, serif;
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
  }

  /* subtle grain texture */
  body::before {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    background-image:
      radial-gradient(ellipse at top, rgba(212,175,120,0.05), transparent 60%),
      radial-gradient(ellipse at bottom right, rgba(201,122,110,0.04), transparent 50%);
    z-index: 0;
  }
  body::after {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    opacity: 0.035;
    z-index: 1;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2'/></filter><rect width='100%' height='100%' filter='url(%23n)'/></svg>");
  }

  main {
    position: relative;
    z-index: 2;
    height: 100vh;
    display: grid;
    grid-template-rows: auto 1fr auto;
    padding: 32px 48px;
    max-width: 960px;
    margin: 0 auto;
  }

  /* HEADER */
  .header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    border-bottom: 1px solid var(--line);
    padding-bottom: 18px;
  }
  .brand {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--cream-dim);
  }
  .brand .dot {
    display: inline-block;
    width: 6px;
    height: 6px;
    background: var(--gold);
    border-radius: 50%;
    margin: 0 8px 1px 8px;
    vertical-align: middle;
    animation: pulse 2.4s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(0.85); }
  }
  .meta {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--cream-faint);
    text-align: center;
  }

  /* BODY */
  .body {
    display: flex;
    flex-direction: column;
    justify-content: flex-start;
    align-items: center;
    gap: 14px;
    padding: 12vh 0 40px;
  }

  .rate-line {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.18em;
    color: var(--cream-dim);
    text-transform: uppercase;
    text-align: center;
    margin-bottom: 18px;
    opacity: 0;
    animation: fadeIn 0.8s ease 0.3s forwards;
  }
  .rate-line .rate-value {
    color: var(--gold);
    font-weight: 500;
  }
  .rate-line .sep { color: var(--cream-faint); margin: 0 10px; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(4px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .field {
    position: relative;
    width: 100%;
    max-width: 820px;
    text-align: center;
  }
  .field-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.3em;
    color: var(--cream-faint);
    text-transform: uppercase;
    margin-bottom: 4px;
  }
  .field-row {
    display: flex;
    align-items: baseline;
    justify-content: center;
    gap: 14px;
    width: 100%;
  }
  .sym {
    font-family: 'Fraunces', serif;
    font-weight: 300;
    font-size: 56px;
    color: var(--cream-faint);
    font-feature-settings: "ss01";
    line-height: 1;
  }
  .amount {
    background: transparent;
    border: none;
    outline: none;
    color: var(--cream-faint);
    font-family: Arial, Helvetica, sans-serif;
    font-weight: 300;
    font-size: 96px;
    font-variation-settings: "opsz" 144;
    line-height: 1;
    width: 1.1ch;
    min-width: 1.1ch;
    max-width: calc(100vw - 190px);
    text-align: center;
    caret-color: var(--gold);
    font-variant-numeric: tabular-nums;
    white-space: nowrap;
    overflow: hidden;
  }
  .amount:empty::before { content: attr(data-placeholder); color: var(--cream-faint); }
  #rub:empty::before { color: var(--gold); }
  .amount:hover:empty::before { color: var(--cream); }
  #rub:hover:empty::before { color: var(--cream); }
  .amount:hover { color: var(--cream); }
  .amount:focus:empty::before,
  .amount:focus:hover:empty::before,
  #rub:focus:empty::before,
  #rub:focus:hover:empty::before { color: transparent; }
  .amount .fraction { font-size: 0.5em; }

  .arrow {
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    color: var(--gold-dim);
    letter-spacing: 0.3em;
    margin: 4px 0 0 0;
  }

  .output .sym { color: var(--gold-dim); }
  #rub {
    color: var(--gold);
    transition: opacity 0.18s ease;
  }
  #rub:hover { color: var(--cream); }
  #rub.flash { opacity: 0.4; }

  /* FOOTER */
  .footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-top: 1px solid var(--line);
    padding-top: 18px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--cream-faint);
  }
  button {
    background: transparent;
    border: 1px solid var(--gold-dim);
    color: var(--gold);
    padding: 6px 14px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: inherit;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s ease;
  }
  button:hover {
    border-color: var(--line);
    color: var(--cream-dim);
  }
  .footer-actions {
    display: flex;
    gap: 10px;
  }
  .header .footer-actions {
    justify-content: flex-end;
  }
  .footer .meta {
    letter-spacing: 0.18em;
  }
  /* error state */
  .error #usd { color: var(--red); }
  .error .rate-line .rate-value { color: var(--red); }

  /* responsive */
  @media (max-width: 600px) {
    main { padding: 20px 20px; }
    .body { padding-top: 7vh; }
    .header, .footer { gap: 14px; }
    .amount { font-size: 64px; max-width: calc(100vw - 98px); }
    .sym { font-size: 38px; }
  }
</style>
</head>
<body>
<main>

  <header class="header">
    <div class="brand">DollarFlip</div>
    <div class="footer-actions">
      <button id="reset">СБРОСИТЬ</button>
      <button id="refresh">ОБНОВИТЬ</button>
    </div>
  </header>

  <section class="body">
    <div class="rate-line" id="rateLine">
      1 $ <span class="sep">=</span> <span class="rate-value" id="rateVal">—</span> ₽
    </div>

    <div class="field input">
      <div class="field-label">вы платите</div>
      <div class="field-row">
        <div id="usd" class="amount" contenteditable="plaintext-only" inputmode="decimal" role="textbox" aria-label="Доллары" data-placeholder="0"></div>
        <span class="sym">$</span>
      </div>
    </div>

    <div class="arrow">↓</div>

    <div class="field output">
      <div class="field-label">вы получаете</div>
      <div class="field-row">
        <div id="rub" class="amount" contenteditable="plaintext-only" inputmode="decimal" role="textbox" aria-label="Рубли" data-placeholder="0"></div>
        <span class="sym">₽</span>
      </div>
    </div>
  </section>

  <footer class="footer">
    <span id="source">источник: —</span>
    <div class="meta" id="meta">загрузка курса…</div>
  </footer>

</main>

<script>
  const $usd = document.getElementById('usd');
  const $rub = document.getElementById('rub');
  const $rateVal = document.getElementById('rateVal');
  const $meta = document.getElementById('meta');
  const $source = document.getElementById('source');
  const $refresh = document.getElementById('refresh');
  const $reset = document.getElementById('reset');
  const $body = document.body;

  let rate = null;
  let activeField = 'usd';

  const fmtRub = n =>
    new Intl.NumberFormat('ru-RU', {
      minimumFractionDigits: 2,
      maximumFractionDigits: 2
    }).format(n);

  const fmtInputAmount = n =>
    new Intl.NumberFormat('ru-RU', {
      maximumFractionDigits: 2
    }).format(n);

  const fmtRate = n =>
    new Intl.NumberFormat('ru-RU', {
      minimumFractionDigits: 4,
      maximumFractionDigits: 4
    }).format(n);

  const fmtUsd = n =>
    new Intl.NumberFormat('ru-RU', {
      minimumFractionDigits: 2,
      maximumFractionDigits: 2
    }).format(n);

  const parseAmount = value =>
    parseFloat(String(value)
      .replace(/\s/g, '')
      .replace(',', '.')
      .replace(/[^0-9.]/g, ''));

  const isEditableAmount = value => /^\d+(?:[,.]\d*)?$/.test(value.replace(/\s/g, ''));

  const getAmount = el => el.textContent.trim();

  function setAmount(el, value) {
    el.textContent = '';
    if (value === '') return;
    const [whole, fraction] = String(value).split(',');
    el.append(document.createTextNode(whole));
    if (fraction !== undefined) {
      el.append(document.createTextNode(','));
      const fractionEl = document.createElement('span');
      fractionEl.className = 'fraction';
      fractionEl.textContent = fraction;
      el.append(fractionEl);
    }
  }

  function formatTypedAmount(input) {
    const raw = getAmount(input);
    if (raw === '' || !isEditableAmount(raw)) return;
    const normalized = raw.replace(/\s/g, '').replace('.', ',');
    const hasTrailingDecimal = normalized.endsWith(',');
    const fraction = normalized.split(',')[1] ?? '';
    const value = parseAmount(normalized);
    if (!isFinite(value)) return;
    const whole = normalized.split(',')[0];
    const formattedWhole = new Intl.NumberFormat('ru-RU', {
      maximumFractionDigits: 0
    }).format(Number(whole));
    const formatted = fraction.length > 0 ? `${formattedWhole},${fraction}` : fmtInputAmount(value);
    setAmount(input, hasTrailingDecimal ? `${formattedWhole},` : formatted);
    moveCaretToEnd(input);
  }

  function moveCaretToEnd(input) {
    const selection = window.getSelection();
    const range = document.createRange();
    range.selectNodeContents(input);
    range.collapse(false);
    selection.removeAllRanges();
    selection.addRange(range);
  }

  function resizeInput(input) {
    const length = Math.max(getAmount(input).length, input.dataset.placeholder.length, 1);
    input.style.width = `${Math.min(length + 0.65, 18)}ch`;
  }

  function resizeInputs() {
    resizeInput($usd);
    resizeInput($rub);
  }

  const fmtTime = d => {
    const pad = x => String(x).padStart(2, '0');
    return `${pad(d.getHours())}:${pad(d.getMinutes())}`;
  };

  function updateFromUsd() {
    if (rate == null) { setAmount($rub, '—'); return; }
    const usd = getAmount($usd);
    const v = parseAmount(usd);
    if (!isFinite(v) || usd === '') {
      setAmount($rub, '');
      resizeInput($rub);
      return;
    }
    $rub.classList.add('flash');
    requestAnimationFrame(() => {
      setAmount($rub, fmtRub(v * rate));
      resizeInput($rub);
      requestAnimationFrame(() => $rub.classList.remove('flash'));
    });
  }

  function updateFromRub() {
    if (rate == null) { setAmount($usd, '—'); return; }
    const rub = getAmount($rub);
    const v = parseAmount(rub);
    if (!isFinite(v) || rub === '') {
      setAmount($usd, '');
      resizeInput($usd);
      return;
    }
    setAmount($usd, fmtUsd(v / rate));
    resizeInput($usd);
  }

  function update() {
    if (activeField === 'rub') updateFromRub();
    else updateFromUsd();
  }

  function clearDefaultValue(input) {
    const value = getAmount(input);
    if (value === '0' || value === '0,00' || value === '—') {
      setAmount(input, '');
      resizeInput(input);
    }
  }

  function selectEnteredValue(input) {
    if (getAmount(input) === '') return;
    requestAnimationFrame(() => {
      const range = document.createRange();
      range.selectNodeContents(input);
      const selection = window.getSelection();
      selection.removeAllRanges();
      selection.addRange(range);
    });
  }

  function restoreZeroOnBlur(input) {
    resizeInput(input);
  }

  function resetConverter() {
    activeField = 'usd';
    setAmount($usd, '');
    setAmount($rub, '');
    resizeInputs();
    $usd.blur();
    $rub.blur();
  }

  async function loadCBR() {
    const r = await fetch('https://www.cbr-xml-daily.ru/daily_json.js', { cache: 'no-store' });
    if (!r.ok) throw new Error('CBR HTTP ' + r.status);
    const d = await r.json();
    return {
      rate: d.Valute.USD.Value,
      source: 'ЦБ РФ',
      time: new Date(d.Date)
    };
  }

  async function loadFallback() {
    const r = await fetch('https://open.er-api.com/v6/latest/USD', { cache: 'no-store' });
    if (!r.ok) throw new Error('Fallback HTTP ' + r.status);
    const d = await r.json();
    return {
      rate: d.rates.RUB,
      source: 'open.er-api.com',
      time: new Date(d.time_last_update_utc)
    };
  }

  async function loadRate() {
    $body.classList.remove('error');
    $meta.textContent = 'загрузка курса…';
    try {
      let info;
      try { info = await loadCBR(); }
      catch { info = await loadFallback(); }

      rate = info.rate;
      $rateVal.textContent = fmtRate(info.rate);
      $source.textContent = `источник: ${info.source}`;
      $meta.textContent = `обновлено ${fmtTime(new Date())}`;
      update();
    } catch (e) {
      rate = null;
      $body.classList.add('error');
      $rateVal.textContent = 'нет связи';
      $meta.textContent = 'ошибка сети';
      $source.textContent = 'источник: —';
    }
  }

  $usd.addEventListener('focus', () => {
    activeField = 'usd';
    clearDefaultValue($usd);
  });
  $rub.addEventListener('focus', () => {
    activeField = 'rub';
    clearDefaultValue($rub);
  });
  $usd.addEventListener('dblclick', () => resetConverter());
  $rub.addEventListener('dblclick', () => resetConverter());
  $usd.addEventListener('blur', () => restoreZeroOnBlur($usd));
  $rub.addEventListener('blur', () => restoreZeroOnBlur($rub));
  $usd.addEventListener('input', () => {
    activeField = 'usd';
    formatTypedAmount($usd);
    resizeInput($usd);
    updateFromUsd();
  });
  $rub.addEventListener('input', () => {
    activeField = 'rub';
    formatTypedAmount($rub);
    resizeInput($rub);
    updateFromRub();
  });
  document.addEventListener('keydown', e => {
    if (e.key !== 'Escape') return;
    e.preventDefault();
    resetConverter();
  });
  $reset.addEventListener('click', resetConverter);
  $refresh.addEventListener('click', loadRate);
  // refresh hourly
  setInterval(loadRate, 60 * 60 * 1000);

  loadRate();
  resizeInputs();
</script>
</body>
</html>
